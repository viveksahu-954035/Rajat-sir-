<!DOCTYPE html>

<style>
body{
    font-family: Arial, sans-serif;
    background: #f4f4f4;
    margin: 0;
    padding: 20px;

.card{
    max-width: 400px;
    margin: auto;
    background: white;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 0 15px rgba(0,0,0,0.2);

.header{

}

.content{
    padding: 20px;
    text-align: center;
}

.content h2{
    margin: 10px 0;
}

.info{
    text-align: center;
    margin-top: 20px;
}

.info p{
    margin: 10px 0;
}

.buttons a{
    display: block;
    text-decoration: none;
    background: #007bff;
    color: white;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
}

.buttons a{
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100%;
    height: 50px;
    text-decoration: none;
    background: #007bff;
    color: white;
    margin: 10px 0;
    border-radius: 8px;
    font-size: 18px;
